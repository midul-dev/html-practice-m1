    <header>
      <h2>Book Your Seat</h2>
    </header>
    <hr />
    <main>
        <p>Fill this <strong>Form</strong> to book your seat</p>
      <form action="post">
        <label for="name">Name :</label>
        <input id="name" type="text" name="yourname" placeholder="Enter your full name" />
        <br />
        <label for="email">Email :</label>
        <input type="email" placeholder="Enter Your Email" id="email">
        <br>
        <label for="number">Phone Number :</label>
        <input id="number" type="number" placeholder="enter your 11 digit phone number" />
        <br />
        <label for="date">Select Date</label>
        <input id="date" type="date" />
        <br>
        <label for="person">Select Person Number :</label>
        <input type="number" id="person" placeholder="Enter total number of people">
        <br>
        <label for="service">Chosse Your CLass :</label>
        <select name="classofservice" id="service">
            <option value="vip">VIP</option>
            <option value="rooftop">Rooftop</option>
            <option value="economy">Economy</option>
        </select>
        <br>
        <br>
        <label for="comment">Write your comment :</label>
    <textarea name="comment" id="comment" rows="3" cols="8"></textarea>
    <br>
    <button type="submit">Book Now</button>
      </form>
    </main>
